<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凡人修仙传 - 网页版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a0a2e;
            --secondary-bg: #2d1b4e;
            --accent-gold: #ffd700;
            --accent-green: #00ff88;
            --accent-red: #ff6b6b;
            --text-primary: #e8d5b7;
            --text-secondary: #8b7355;
            --border-gold: #c9a227;
            --shadow-purple: rgba(138, 43, 226, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ZCOOL XiaoWei', serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #0d0518 50%, var(--primary-bg) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(138, 43, 226, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(45, 27, 78, 0.5) 0%, transparent 70%);
        }

        .game-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题区域 - 紧凑版 */
        .game-header {
            text-align: center;
            padding: 8px 15px;
            background: linear-gradient(180deg, rgba(45, 27, 78, 0.8) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-gold);
            margin-bottom: 10px;
            position: relative;
            flex-shrink: 0;
        }

        .game-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem;
            color: var(--accent-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.3);
            letter-spacing: 4px;
            animation: titleGlow 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(255, 215, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.3); }
            50% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.5); }
        }

        .game-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 10px;
            display: inline-block;
        }

        /* 玩家状态面板 - 紧凑版 */
        .player-panel {
            background: linear-gradient(135deg, rgba(45, 27, 78, 0.9) 0%, rgba(26, 10, 46, 0.95) 100%);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 10px;
            box-shadow: 0 5px 20px var(--shadow-purple);
            display: grid;
            grid-template-columns: auto 1.2fr 1fr 1fr 1fr auto;
            gap: 15px;
            align-items: center;
            flex-shrink: 0;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--primary-bg) 100%);
            border: 2px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            animation: avatarPulse 2s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
        }

        .player-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .player-name {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.2rem;
            color: var(--accent-gold);
        }

        .player-realm {
            font-size: 0.8rem;
            color: var(--accent-green);
            padding: 2px 8px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            border: 1px solid var(--accent-green);
            display: inline-block;
            width: fit-content;
        }

        .stat-bar {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .stat-track {
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .stat-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
        }

        .stat-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
            border-radius: 10px 10px 0 0;
        }

        .hp-fill { background: linear-gradient(90deg, #ff4444 0%, #ff6b6b 100%); }
        .mp-fill { background: linear-gradient(90deg, #4444ff 0%, #6b6bff 100%); }
        .exp-fill { background: linear-gradient(90deg, var(--accent-gold) 0%, #ffed4a 100%); }

        /* 主游戏区域 - 自适应高度 */
        .game-main {
            display: grid;
            grid-template-columns: 160px 1fr 220px;
            gap: 10px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* 功能面板 - 紧凑版 */
        .function-panel {
            background: linear-gradient(180deg, rgba(45, 27, 78, 0.95) 0%, rgba(26, 10, 46, 0.98) 100%);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
        }

        .panel-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1rem;
            color: var(--accent-gold);
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-gold);
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        .function-btn {
            background: linear-gradient(135deg, rgba(45, 27, 78, 0.8) 0%, rgba(26, 10, 46, 0.9) 100%);
            border: 1px solid var(--text-secondary);
            border-radius: 6px;
            padding: 0 10px;
            color: var(--text-primary);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
            height: 36px;
            box-sizing: border-box;
        }

        .function-btn:hover {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.3) 0%, rgba(45, 27, 78, 0.8) 100%);
            border-color: var(--accent-gold);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .function-btn.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(138, 43, 226, 0.3) 100%);
            border-color: var(--accent-gold);
        }

        .function-btn .icon {
            font-size: 1.1rem;
        }

        /* 中央游戏区域 - 紧凑版 */
        .central-panel {
            background: linear-gradient(180deg, rgba(45, 27, 78, 0.9) 0%, rgba(26, 10, 46, 0.95) 100%);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .game-view {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            position: relative;
            min-height: 0;
        }

        .view-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.3rem;
            color: var(--accent-gold);
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            flex-shrink: 0;
        }

        .view-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* 日志区域 - 固定高度 */
        .log-panel {
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--border-gold);
            padding: 8px 12px;
            height: 100px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .log-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .log-content {
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
        }

        .log-entry.combat { color: var(--accent-red); }
        .log-entry.cultivation { color: var(--accent-green); }
        .log-entry.system { color: var(--accent-gold); }
        .log-entry.item { color: #9b59b6; }

        /* 右侧信息面板 - 紧凑版 */
        .info-panel {
            background: linear-gradient(180deg, rgba(45, 27, 78, 0.95) 0%, rgba(26, 10, 46, 0.98) 100%);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .info-section {
            margin-bottom: 0;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .info-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .attribute-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .attribute-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 5px;
            text-align: center;
        }

        .attribute-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .attribute-value {
            font-size: 1rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* 物品网格 - 紧凑版 */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--text-secondary);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .item-slot:hover {
            border-color: var(--accent-gold);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .item-slot.has-item {
            background: rgba(45, 27, 78, 0.5);
        }

        .item-icon {
            font-size: 1.2rem;
        }

        .item-quantity {
            position: absolute;
            bottom: 2px;
            right: 3px;
            font-size: 0.65rem;
            color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.7);
            padding: 1px 3px;
            border-radius: 2px;
        }

        .item-quality-common { border-color: #888; }
        .item-quality-good { border-color: #4CAF50; }
        .item-quality-excellent { border-color: #2196F3; }
        .item-quality-legendary { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* 游戏视图内容 */
        .view-content {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 修炼视图 - 紧凑版 */
        .cultivation-area {
            text-align: center;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            justify-content: center;
            min-height: 0;
        }

        .cultivation-progress {
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .progress-track {
            height: 22px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 11px;
            overflow: hidden;
            border: 1px solid var(--border-gold);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold) 0%, #ffed4a 100%);
            border-radius: 11px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
        }

        .cultivation-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            border: 2px solid #81C784;
            border-radius: 20px;
            padding: 12px 35px;
            color: white;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px auto 0;
            width: fit-content;
        }

        .cultivation-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.5);
        }

        .cultivation-btn:disabled {
            background: #555;
            border-color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .cultivation-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* 战斗视图 - 紧凑版 */
        .battle-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            padding: 10px;
            min-height: 0;
        }

        .battle-field {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
            padding: 10px;
            flex: 1;
        }

        .combatant {
            text-align: center;
            padding: 15px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid var(--text-secondary);
        }

        .combatant.player {
            border-color: var(--accent-gold);
        }

        .combatant.monster {
            border-color: var(--accent-red);
        }

        .combatant-avatar {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .combatant-name {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.1rem;
            color: var(--accent-gold);
            margin-bottom: 6px;
        }

        .combatant-hp {
            margin-top: 8px;
        }

        .combatant-hp .stat-track {
            height: 10px;
        }

        .battle-vs {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.4rem;
            color: var(--accent-red);
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
        }

        .battle-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px;
        }

        .battle-btn {
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--primary-bg) 100%);
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            padding: 8px 18px;
            color: var(--text-primary);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .battle-btn:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(138, 43, 226, 0.3) 100%);
            transform: translateY(-2px);
            box-shadow: 0 3px 15px rgba(255, 215, 0, 0.3);
        }

        .battle-btn.attack { border-color: var(--accent-red); }
        .battle-btn.skill { border-color: #9b59b6; }
        .battle-btn.defend { border-color: #3498db; }
        .battle-btn.flee { border-color: var(--text-secondary); }

        .battle-location {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        /* 灵草园视图 - 紧凑版 */
        .herb-garden {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
            flex: 1;
            align-content: start;
        }

        .herb-plot {
            background: linear-gradient(180deg, rgba(0, 100, 0, 0.3) 0%, rgba(0, 50, 0, 0.5) 100%);
            border: 1px solid #228B22;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            padding: 8px 4px;
        }

        .herb-plot:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .herb-plot.growing::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 255, 136, 0.3) 100%);
            transition: height 0.5s ease;
        }

        .herb-plot.ready {
            border-color: var(--accent-green);
            animation: readyPulse 1s ease-in-out infinite;
        }

        @keyframes readyPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        }

        .herb-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .herb-status {
            font-size: 0.8rem;
            color: var(--accent-green);
        }

        .herb-timer {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .herb-garden-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            margin-top: auto;
        }

        /* 炼丹视图 - 紧凑版 */
        .alchemy-area {
            text-align: center;
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .alchemy-furnace {
            font-size: 4rem;
            margin: 10px 0;
            animation: furnaceGlow 2s ease-in-out infinite;
        }

        @keyframes furnaceGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 107, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 107, 0, 0.8)); }
        }

        .alchemy-recipes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-width: 500px;
            margin: 10px auto;
            overflow-y: auto;
            flex: 1;
        }

        .recipe-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--text-secondary);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .recipe-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .recipe-name {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1rem;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        .recipe-materials {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .recipe-effect {
            font-size: 0.75rem;
            color: var(--accent-green);
            margin-top: 3px;
        }

        .alchemy-progress {
            max-width: 350px;
            margin: 10px auto;
        }

        .alchemy-progress .progress-track {
            height: 16px;
        }

        /* 坊市视图 - 紧凑版 */
        .market-area {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .market-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .market-tab {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--text-secondary);
            border-radius: 15px;
            padding: 6px 15px;
            color: var(--text-primary);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .market-tab.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(138, 43, 226, 0.3) 100%);
            border-color: var(--accent-gold);
        }

        .market-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            overflow-y: auto;
            flex: 1;
        }

        .market-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--text-secondary);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .market-item:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .market-item-icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .market-item-name {

        /* 突破确认模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--primary-bg) 100%);

        /* 突破动画 */
        .breakthrough-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .breakthrough-animation.active {
            animation: breakthroughFlash 2s ease-out;
        }

        @keyframes breakthroughFlash {
            0% { opacity: 0; visibility: visible; }
            20% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }

        /* 伤害数字 */

        /* 通知提示 */

        /* ==================== 动效优化 v2.5.1 - 新增动画 ==================== */

        /* 按钮点击波纹效果 */
        .btn-ripple {
            position: relative;
            overflow: hidden;
        }
        .btn-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
            pointer-events: none;
        }
        .btn-ripple:active::after {
            width: 200%;
            height: 200%;
            opacity: 0;
        }

        /* 按钮按下效果 */
        .btn-press {
            transition: transform 0.1s ease, filter 0.1s ease;
        }
        .btn-press:active {
            transform: scale(0.95);
            filter: brightness(0.85);
        }

        /* 屏幕震动 */
        .screen-shake {
            animation: screenShake 0.15s ease-in-out;
        }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(3px, -2px); }
            75% { transform: translate(-2px, -1px); }
        }

        /* 攻击光效 */
        .attack-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8) 0%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            animation: attackFlash 0.4s ease-out;
        }
        @keyframes attackFlash {
            0% { opacity: 0.8; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* 技能光效 */
        .skill-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            animation: skillFlash 0.5s ease-out;
        }
        @keyframes skillFlash {
            0% { opacity: 0.9; transform: scale(0.3); filter: blur(0); }
            50% { opacity: 1; transform: scale(1); filter: blur(2px); }
            100% { opacity: 0; transform: scale(1.3); filter: blur(5px); }
        }

        /* 防御护盾 */
        .shield-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(0, 150, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.5), inset 0 0 30px rgba(0, 150, 255, 0.3);
            animation: shieldGlow 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes shieldGlow {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* 伤害数字优化 - 弹跳出现 */
        .damage-number-enhanced {
            position: absolute;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-red);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            animation: damageNumberPop 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        .damage-number-enhanced.critical {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px #ff0000, 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        .damage-number-enhanced.heal {
            color: var(--accent-green);
        }
        @keyframes damageNumberPop {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            40% { transform: translateY(-30px) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        /* 怪物受击效果 */
        .monster-hit {
            animation: monsterHit 0.3s ease-out;
        }
        @keyframes monsterHit {
            0% { transform: translateX(0); filter: brightness(1); }
            25% { transform: translateX(-10px); filter: brightness(1.5) sepia(1) hue-rotate(-50deg) saturate(3); }
            50% { transform: translateX(5px); filter: brightness(1.2) sepia(1) hue-rotate(-50deg) saturate(2); }
            75% { transform: translateX(-3px); filter: brightness(1.1); }
            100% { transform: translateX(0); filter: brightness(1); }
        }

        /* 胜利特效 */
        .victory-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .victory-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 4rem;
            color: var(--accent-gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            animation: victoryTextPop 1.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes victoryTextPop {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            30% { opacity: 1; transform: scale(1.1) rotate(5deg); }
            50% { transform: scale(1) rotate(0deg); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.2); }
        }

        /* 经验值飘浮 */
        .exp-float {
            position: absolute;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.2rem;
            color: var(--accent-gold);
            animation: expFloat 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 99;
        }
        @keyframes expFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.8); }
            20% { opacity: 1; transform: translateY(-30px) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.9); }
        }

        /* 突破动画 - 四阶段 */
        .breakthrough-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .breakthrough-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .breakthrough-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;

        .breakthrough-stage.active {
            opacity: 1;

        /* 阶段1: 蓄力 - 光线汇聚 */
        .stage-1 .converge-line {
            position: absolute;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #9b59b6, transparent);
            animation: convergeLine 0.8s ease-out forwards;
        }

            0% { opacity: 0; transform: scaleY(0); }
            50% { opacity: 1; transform: scaleY(1); }
            100% { opacity: 0.5; transform: scaleY(1); }
        }
        /* 阶段2: 爆发 - 闪光 */
        .stage-2 .burst-flash {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(155,89,182,0.5) 40%, transparent 70%);
            animation: burstFlash 0.6s ease-out forwards;
        }
        @keyframes burstFlash {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        /* 阶段3: 展示 - 境界名称 */
        .stage-3 .realm-name {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 5rem;
            color: var(--accent-gold);

            animation: realmNameShow 1s ease-out forwards;
            opacity: 0;
        }
        @keyframes realmNameShow {
            0% { opacity: 0; transform: scale(0.3); filter: blur(10px); }
            50% { opacity: 1; transform: scale(1.1); filter: blur(0); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .stage-3 .stat-boost {
            position: absolute;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: var(--accent-green);
            animation: statBoostFloat 0.8s ease-out forwards;

            50% { opacity: 1; transform: translateY(-10px); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

            // 数字滚动动画
            animateNumber(element, from, to, duration = 400, callback) {
                const startTime = performance.now();
                const diff = to - from;
                
                const easeOut = t => 1 - Math.pow(1 - t, 3);
                
                const update = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = easeOut(progress);
                    const current = Math.floor(from + diff * eased);
                    
                    if (element) element.textContent = current;
                    
                    if (progress < 1) {
                        requestAnimationFrame(update);
                    } else if (callback) {
                        callback();
                    }
                };
                
                requestAnimationFrame(update);
            },
            
            // 数字变化高亮
            numberChange(element, type = 'normal') {
                if (element) {
                    element.classList.remove('number-change', 'increase', 'decrease');

                    const velocity = 30 + Math.random() * 30;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity;
                    
                    particle.style.animation = `particleFloat 0.6s ease-out forwards`;
                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    
                    container.appendChild(particle);
                    setTimeout(() => particle.remove(), 600);
                }

        // ==================== 工具函数 ====================
        
        // 游戏日志存储
        let gameLogs = [];
        
        function addLog(message, type = 'system') {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            const timestamp = new Date().toLocaleTimeString();
            entry.className = `log-entry ${type} log-entry-new`;
            entry.textContent = `[${timestamp}] ${message}`;
            logContent.insertBefore(entry, logContent.firstChild);
            
            // 动画结束后移除动画类
            setTimeout(() => entry.classList.remove('log-entry-new'), 300);
            
            // 限制日志数量
            while (logContent.children.length > 50) {
                logContent.removeChild(logContent.lastChild);
            }
            
            // 保存到日志数组
            const logEntry = {
                time: new Date().toISOString(),
                timestamp: timestamp,
                message: message,
                type: type
            };
            gameLogs.push(logEntry);
            
            // 限制日志数组大小
            if (gameLogs.length > 500) {
                gameLogs.shift();
            }
            
            // 保存日志到localStorage
            localStorage.setItem('xiuxian_logs', JSON.stringify(gameLogs));
        }
        
        function loadLogs() {
            const savedLogs = localStorage.getItem('xiuxian_logs');
            if (savedLogs) {
                gameLogs = JSON.parse(savedLogs);
                
                // 恢复显示最近50条日志
                const logContent = document.getElementById('logContent');
                logContent.innerHTML = '';
                
                const recentLogs = gameLogs.slice(-50).reverse();
                recentLogs.forEach(log => {
                    const entry = document.createElement('div');
                    entry.className = `log-entry ${log.type}`;
                    entry.textContent = `[${log.timestamp}] ${log.message}`;
                    logContent.appendChild(entry);
                });
            }
        }
        
        function exportLogs() {
            const player = gameState.player;
            const exportData = {
                version: '1.0',
                exportType: 'full',
                playerInfo: {
                    name: player.name,
                    realm: player.realm,
                    level: player.level,
                    exp: player.exp,
                    expNeeded: player.expNeeded,
                    hp: player.hp,
                    maxHp: player.maxHp,
                    mp: player.mp,
                    maxMp: player.maxMp,
                    attack: player.attack,
                    defense: player.defense,
                    spirit: player.spirit,
                    agility: player.agility,
                    gold: player.gold,
                    skills: player.skills,
                    items: player.items,
                    cultivationTime: player.cultivationTime,
                    totalExp: player.totalExp,
                    weapon: player.weapon,
                    armor: player.armor
                },
                garden: gameState.garden,
                exportTime: new Date().toLocaleString(),
                logs: gameLogs
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `xiuxian_save_${player.realm}_${player.level}_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('游戏进度已导出！', 'success');
        }
        
        function clearLogs() {
            gameLogs = [];
            localStorage.removeItem('xiuxian_logs');
            document.getElementById('logContent').innerHTML = '<div class="log-entry system">日志已清空</div>';
            showNotification('日志已清空', 'success');
        }
        
        function importLogs() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        
                        // 检查是否是完整存档
                        if (data.exportType === 'full' && data.playerInfo) {
                            // 确认导入
                            if (confirm(`确定要导入以下存档吗？\n\n玩家：${data.playerInfo.name}\n境界：${data.playerInfo.realm} ${data.playerInfo.level}层\n修为：${data.playerInfo.totalExp}\n灵石：${data.playerInfo.gold}\n\n⚠️ 这将覆盖当前游戏进度！`)) {
                                // 恢复玩家数据
                                gameState.player = { ...gameState.player, ...data.playerInfo };
                                
                                // 恢复灵草园
                                if (data.garden) {
                                    gameState.garden = data.garden;
                                }
                                
                                // 恢复日志
                                if (data.logs && Array.isArray(data.logs)) {
                                    gameLogs = data.logs;
                                    localStorage.setItem('xiuxian_logs', JSON.stringify(gameLogs));
                                    loadLogs();
                                }
                                
                                // 保存到localStorage
                                saveGame();
                                
                                // 刷新UI
                                updatePlayerUI();
                                switchView(gameState.currentView);
                                
                                addLog(`✅ 成功导入存档：${data.playerInfo.name} (${data.playerInfo.realm} ${data.playerInfo.level}层)`, 'system');
                                showNotification('游戏进度导入成功！', 'success');
                            }
                        } else if (data.logs && Array.isArray(data.logs)) {
                            // 旧格式：仅导入日志
                            gameLogs = [...gameLogs, ...data.logs];
                            
                            // 去重
                            const seen = new Set();
                            gameLogs = gameLogs.filter(log => {
                                const key = `${log.time}_${log.message}`;
                                if (seen.has(key)) return false;
                                seen.add(key);
                                return true;
                            });
                            
                            if (gameLogs.length > 500) {
                                gameLogs = gameLogs.slice(-500);
                            }
                            
                            localStorage.setItem('xiuxian_logs', JSON.stringify(gameLogs));
                            loadLogs();
                            
                            if (data.playerInfo) {
                                addLog(`导入日志 - 来自 ${data.playerInfo.name} (${data.playerInfo.realm} ${data.playerInfo.level}层)`, 'system');
                            }
                            
                            showNotification(`成功导入 ${data.logs.length} 条日志！`, 'success');
                        } else {
                            showNotification('无效的游戏存档格式', 'error');
                        }
                    } catch (err) {
                        showNotification('文件解析失败：' + err.message, 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function showNotification(message, type = 'success') {

        function saveGame() {
            // 序列化前将 Set 转为数组
            const saveData = JSON.parse(JSON.stringify(gameState, (key, value) => {
                if (value instanceof Set) return [...value];
                return value;
            }));
            localStorage.setItem('xiuxian_save', JSON.stringify(saveData));
            gameState.lastSave = Date.now();
        }

        function loadGame() {
            const saved = localStorage.getItem('xiuxian_save');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
                // 修复 Set 反序列化问题
                if (gameState.collection) {
                    ['monster', 'herb', 'pill', 'equipment'].forEach(type => {
                        if (!(gameState.collection[type] instanceof Set)) {
                            gameState.collection[type] = new Set(gameState.collection[type] ? Object.values(gameState.collection[type]) : []);
                        }
                    });
                    if (!gameState.collection.rewardsClaimed) {
                        gameState.collection.rewardsClaimed = { monster: [], herb: [], pill: [], equipment: [] };
                    }
                }
                // 修复旧存档修为溢出
                if (gameState.player.exp > gameState.player.expNeeded) {
                    gameState.player.exp = gameState.player.expNeeded;
                }
                addLog('存档已加载，继续你的修仙之路！', 'system');
            }
            // 同时加载日志
            loadLogs();
        }

            return true;
        }

        let cultivationInterval = null;

        function startCultivation() {
            const btn = document.getElementById('cultivateBtn');
            if (cultivationInterval) {
                clearInterval(cultivationInterval);
                cultivationInterval = null;
                btn.textContent = '🌟 开始修炼';
                btn.style.background = 'linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%)';
                saveGame();
                return;
            }
            
            btn.textContent = '⏸️ 停止修炼';
            btn.style.background = 'linear-gradient(135deg, #f39c12 0%, #e67e22 100%)';
            
            cultivationInterval = setInterval(() => {
                const gain = Math.floor((gameState.player.spirit + 5) * (1 + gameState.player.spirit * 0.1));
                gameState.player.exp += gain;
                gameState.player.cultivationTime++;
                gameState.player.totalExp += gain;
                
                // 修为上限截断
                if (gameState.player.exp > gameState.player.expNeeded) {
                    gameState.player.exp = gameState.player.expNeeded;
                }
                
                if (gameState.player.exp >= gameState.player.expNeeded) {
                    clearInterval(cultivationInterval);
                    cultivationInterval = null;
                    addLog(`修为已满，可以尝试突破境界了！`, 'cultivation');
                    showNotification('修为已满，可以尝试突破！', 'success');
                    switchView('cultivation');
                }
                
                updatePlayerUI();
            }, 1000);
            
            addLog('开始修炼，吸收天地灵气...', 'cultivation');
        }

        function calculateBreakthroughChance() {
            const player = gameState.player;
            let chance = 30 + player.spirit * 2;
            
            // 检查背包中是否有破境丹
            const breakthroughPill = player.items.find(i => i.id === 'breakthrough_pill');
            if (breakthroughPill) {
                chance += 20;
            }
            
            return Math.min(chance, 95);
        }

        function openBreakthroughModal() {
            const modal = document.getElementById('breakthroughModal');
            const text = document.getElementById('breakthroughText');
            text.innerHTML = `
                你当前境界：<strong style="color: ${getRealmColor(gameState.player.realm)}">${gameState.player.realm} · ${gameState.player.level}层</strong><br><br>
                突破成功率：<strong style="color: var(--accent-gold)">${calculateBreakthroughChance()}%</strong><br><br>
                ${calculateBreakthroughChance() < 50 ? '<em style="color: var(--accent-red);">警告：成功率较低，失败可能会损失部分修为！</em>' : ''}<br><br>
                是否尝试突破？
            `;
            modal.classList.add('active');
        }

        function closeBreakthroughModal() {
            document.getElementById('breakthroughModal').classList.remove('active');
        }

        async function confirmBreakthrough() {
            closeBreakthroughModal();
            
            const player = gameState.player;
            const chance = calculateBreakthroughChance();
            const roll = Math.random() * 100;
            const success = roll < chance;
            
            const overlay = document.getElementById('breakthroughOverlay');
            const stage1 = document.getElementById('breakthroughStage1');
            const stage2 = document.getElementById('breakthroughStage2');
            const stage3 = document.getElementById('breakthroughStage3');
            const realmNameEl = document.getElementById('breakthroughRealmName');
            
            // 显示覆盖层
            overlay.classList.add('active');
            
            if (success) {
                // ===== 阶段1: 蓄力 (800ms) =====
                stage1.classList.add('active');
                await new Promise(r => setTimeout(r, 800));
                stage1.classList.remove('active');
                
                // ===== 阶段2: 爆发 (600ms) =====
                stage2.classList.add('active');
                AnimationUtils.screenShake(8, 300);
                await new Promise(r => setTimeout(r, 600));
                stage2.classList.remove('active');
                
                // ===== 阶段3: 展示 (1000ms) =====
                stage3.classList.add('active');
                
                // 计算突破后的境界
                const realmIndex = REALM_ORDER.indexOf(player.realm);
                const currentRealmConfig = REALMS[player.realm];
                let newRealmName = '';
                
                if (player.level >= currentRealmConfig.levels) {
                    if (realmIndex < REALM_ORDER.length - 1) {
                        newRealmName = REALM_ORDER[realmIndex + 1];
                    } else {
                        newRealmName = '飞升成仙';
                    }
                } else {
                    newRealmName = `${player.realm} · 第${player.level + 1}层`;
                }
                
                realmNameEl.textContent = newRealmName;
                
                // 属性提升数字飘浮
                const boosts = ['生命 +20', '灵力 +10', '攻击 +3', '防御 +2'];
                for (let i = 0; i < boosts.length; i++) {
                    setTimeout(() => {
                        const el = document.createElement('div');
                        el.className = 'stat-boost';
                        el.textContent = boosts[i];
                        el.style.left = '50%';
                        el.style.top = '60%';
                        el.style.transform = `translateX(-50%) translateY(${i * 30}px)`;
                        el.style.animationDelay = '0s';
                        stage3.appendChild(el);
                        setTimeout(() => el.remove(), 800);
                    }, i * 200);
                }
                
                await new Promise(r => setTimeout(r, 1000));
                stage3.classList.remove('active');
                
                // ===== 执行突破逻辑 =====
                if (player.level >= currentRealmConfig.levels) {
                    if (realmIndex < REALM_ORDER.length - 1) {
                        player.realm = REALM_ORDER[realmIndex + 1];
                        player.level = 1;
                        addLog(`🎉 恭喜！境界突破成功，迈入${player.realm}！`, 'cultivation');
                        showNotification(`突破成功！进入${player.realm}！`, 'success');
                    } else {
                        addLog(`🌟🌟🌟 大道已成，飞升仙界！🌟🌟🌟`, 'cultivation');
                        showNotification('飞升成仙！游戏通关！', 'success');
                    }
                } else {
                    player.level++;
                    addLog(`🎉 恭喜！${player.realm}突破到第${player.level}层！`, 'cultivation');
                    showNotification(`突破成功！${player.level}层！`, 'success');
                }
                
                player.maxHp += 20 + realmIndex * 5;
                player.hp = player.maxHp;
                player.maxMp += 10 + realmIndex * 3;
                player.mp = player.maxMp;
                player.attack += 3 + realmIndex * 2;
                player.defense += 2 + realmIndex;
                player.exp = 0;
                // 跨境界突破时重置expNeeded
                if (player.level >= currentRealmConfig.levels && realmIndex < REALM_ORDER.length - 1) {
                    player.expNeeded = 100 + (realmIndex + 1) * 80;
                } else {
                    player.expNeeded = Math.floor(player.expNeeded * 1.5);
                }
                
                // 突破成功才消耗破境丹
                const pillIndex = player.items.findIndex(i => i.id === 'breakthrough_pill');
                if (pillIndex >= 0) {
                    player.items[pillIndex].count--;
                    if (player.items[pillIndex].count <= 0) {
                        player.items.splice(pillIndex, 1);
                    }
                }
                
            } else {
                // 突破失败 - 简化动画
                stage2.classList.add('active');
                const flash = stage2.querySelector('.burst-flash');
                if (flash) {
                    flash.style.background = 'radial-gradient(circle, rgba(150,150,150,0.9) 0%, rgba(100,100,100,0.5) 40%, transparent 70%)';
                }
                await new Promise(r => setTimeout(r, 600));
                stage2.classList.remove('active');
                
                player.exp = Math.floor(player.exp * 0.5);
                player.hp = Math.floor(player.hp * 0.7);
                addLog(`突破失败！损失部分修为和生命...`, 'system');
                showNotification('突破失败...继续努力！', 'error');
            }
            
            // 关闭覆盖层
            overlay.classList.remove('active');
            
            updatePlayerUI();
            saveGame();
            switchView('cultivation');
        }

        function renderSkillButtons() {
            let html = '';
            gameState.player.skills.forEach(skillId => {
                const skill = SKILLS.find(s => s.id === skillId);
                if (skill && skill.id !== 'basic_attack') {
                    const canUse = canUseSkill(skillId);
                    html += `<button class="battle-btn skill btn-press" onclick="battleAction('skill', '${skill.id}')" ${!canUse ? 'disabled' : ''}>${skill.icon} ${skill.name}</button>`;
                }
            });
            return html;
        }

        function startBattle(difficulty) {
            let monsterPool;
            switch (difficulty) {
                case 'easy':
                    monsterPool = MONSTERS.filter(m => m.realm === '炼气期');
                    break;
                case 'medium':
                    monsterPool = MONSTERS.filter(m => m.realm === '筑基期');
                    break;
                case 'hard':
                    monsterPool = MONSTERS.filter(m => m.realm === '结丹期');
                    break;
            }
            
            const monsterTemplate = monsterPool[Math.floor(Math.random() * monsterPool.length)];
            const monster = { ...monsterTemplate };
            
            // 根据玩家境界调整妖兽属性
            const realmIndex = REALM_ORDER.indexOf(gameState.player.realm);
            const levelMult = 1 + (realmIndex * 0.3) + (gameState.player.level * 0.05);
            monster.hp = Math.floor(monster.hp * levelMult);
            monster.attack = Math.floor(monster.attack * levelMult);
            monster.defense = Math.floor(monster.defense * levelMult);
            monster.exp = Math.floor(monster.exp * levelMult);
            monster.gold = Math.floor(monster.gold * levelMult);
            
            gameState.battle = {
                inBattle: true,
                monster: monster,
                monsterHp: monster.hp,
                monsterMaxHp: monster.hp,
                turn: 'player',
                defending: false
            };
            
            addLog(`遭遇${monster.name}！战斗开始！`, 'combat');
            switchView('battle');
        }

        function battleAction(action, skillId = null) {
            if (!gameState.battle.inBattle) return;
            
            const battle = gameState.battle;
            const player = gameState.player;
            const monster = battle.monster;
            const battleArea = document.querySelector('.battle-area');
            const monsterEl = document.querySelector('.combatant.monster');
            
            if (action === 'attack') {
                // 攻击动效
                AnimationUtils.screenShake(3, 150);
                if (battleArea) AnimationUtils.attackFlash(battleArea);
                
                const damage = Math.max(1, player.attack - monster.defense / 2 + Math.floor(Math.random() * 5));
                battle.monsterHp -= damage;
                
                // 怪物受击效果
                if (monsterEl) AnimationUtils.monsterHit(monsterEl);
                
                // 优化版伤害数字
                const monsterRect = monsterEl ? monsterEl.getBoundingClientRect() : { left: 0, top: 0 };
                AnimationUtils.showDamageNumber(damage, monsterRect.left + 40, monsterRect.top + 20);
                
                addLog(`你对${monster.name}造成了${damage}点伤害！`, 'combat');
                showDamageNumber(damage, 'enemy');
            } else if (action === 'skill' && skillId) {
                const skill = SKILLS.find(s => s.id === skillId);
                if (skill && canUseSkill(skillId)) {
                    player.mp -= skill.mpCost || 0;
                    
                    // 技能光效
                    const skillColors = {
                        'fireball': 'rgba(255, 100, 0, 0.8)',
                        'thunder': 'rgba(255, 255, 0, 0.8)',
                        'heal': 'rgba(0, 255, 100, 0.8)',
                        'ice_shield': 'rgba(0, 200, 255, 0.8)',
                        'spirit_blade': 'rgba(200, 100, 255, 0.8)'
                    };
                    
                    if (skill.attackBonus) {
                        AnimationUtils.screenShake(5, 200);
                        if (battleArea) AnimationUtils.skillFlash(battleArea, skillColors[skillId] || 'white');
                        
                        const damage = Math.max(1, Math.floor((player.attack + skill.attackBonus) * 1.2) - monster.defense / 2);
                        battle.monsterHp -= damage;
                        
                        if (monsterEl) AnimationUtils.monsterHit(monsterEl);
                        
                        const monsterRect = monsterEl ? monsterEl.getBoundingClientRect() : { left: 0, top: 0 };
                        AnimationUtils.showDamageNumber(damage, monsterRect.left + 40, monsterRect.top + 20, damage > player.attack * 1.5);
                        
                        addLog(`你施展${skill.name}，对${monster.name}造成了${damage}点伤害！`, 'combat');
                        showDamageNumber(damage, 'enemy');
                    } else if (skill.healAmount) {
                        if (battleArea) AnimationUtils.skillFlash(battleArea, skillColors[skillId] || 'rgba(0, 255, 100, 0.8)');
                        
                        player.hp = Math.min(player.maxHp, player.hp + skill.healAmount);
                        addLog(`你使用${skill.name}，恢复了${skill.healAmount}点生命！`, 'cultivation');
                        showDamageNumber(skill.healAmount, 'player', true);
                    } else if (skill.defenseBonus) {
                        battle.defending = true;
                        if (battleArea) AnimationUtils.showShield(battleArea);
                        addLog(`你使用${skill.name}，防御力临时提升！`, 'cultivation');
                    }
                }
            } else if (action === 'defend') {
                battle.defending = true;
                if (battleArea) AnimationUtils.showShield(battleArea);
                addLog('你进入防御姿态！', 'cultivation');
            } else if (action === 'flee') {
                const fleeChance = 40 + player.agility * 2;
                if (Math.random() * 100 < fleeChance) {
                    gameState.battle.inBattle = false;
                    addLog('你成功逃跑了！', 'system');
                    switchView('battle');
                    return;
                } else {
                    addLog('逃跑失败！', 'combat');
                }
            }
            
            // 检查战斗结果
            if (battle.monsterHp <= 0) {
                victory();
                return;
            }
            
            if (player.hp <= 0) {
                defeat();
                return;
            }
            
            // 怪物回合
            setTimeout(() => {
                monsterTurn();
            }, 500);
            
            updatePlayerUI();
            switchView('battle');
        }

        function monsterTurn() {
            const battle = gameState.battle;
            const monster = battle.monster;
            const player = gameState.player;
            const battleArea = document.querySelector('.battle-area');
            const playerEl = document.querySelector('.combatant.player');
            
            let damage = Math.max(1, monster.attack - (battle.defending ? player.defense * 1.5 : player.defense));
            damage = Math.floor(damage * (0.8 + Math.random() * 0.4));
            
            // 怪物攻击动效
            AnimationUtils.screenShake(2, 100);
            
            player.hp -= damage;
            battle.defending = false;
            
            // 玩家受击效果
            if (playerEl) {
                playerEl.style.animation = 'monsterHit 0.3s ease-out';
                setTimeout(() => playerEl.style.animation = '', 300);
            }
            
            // 优化版伤害数字
            const playerRect = playerEl ? playerEl.getBoundingClientRect() : { left: 0, top: 0 };
            AnimationUtils.showDamageNumber(damage, playerRect.left + 40, playerRect.top + 20);
            
            addLog(`${monster.name}对你造成了${damage}点伤害！`, 'combat');
            showDamageNumber(damage, 'player');
            
            if (player.hp <= 0) {
                defeat();
                return;
            }
            
            updatePlayerUI();
            switchView('battle');
        }

        function victory() {
            const battle = gameState.battle;
            const monster = battle.monster;
            
            // 播放胜利特效
            AnimationUtils.showVictory();
            
            // 飘浮经验值动画
            const monsterIcon = document.querySelector('.monster-icon');
            if (monsterIcon) {
                const rect = monsterIcon.getBoundingClientRect();
                AnimationUtils.showExpFloat(monster.exp, rect.left + rect.width/2, rect.top);
            }
            
            gameState.player.exp += monster.exp;
            // 修为上限截断
            if (gameState.player.exp > gameState.player.expNeeded) {
                gameState.player.exp = gameState.player.expNeeded;
            }
            gameState.player.gold += monster.gold;
            
            // 添加到妖兽图鉴
            addToCollection('monster', monster.name);
            
            // 随机掉落灵草
            if (Math.random() < 0.5) {
                const herbType = Math.random() < 0.7 ? 0 : (Math.random() < 0.8 ? 1 : 2);
                const herb = { ...HERBS[herbType], id: `herb_${Date.now()}`, quality: herbType === 0 ? 'common' : 'good' };
                addHerbToInventory(herb);
                addLog(`获得了${herb.icon}${herb.name}！`, 'item');
            }
            
            // 随机掉落装备并添加到图鉴
            if (Math.random() < 0.3) {
                const qualities = ['common', 'good', 'excellent'];
                const quality = qualities[Math.floor(Math.random() * qualities.length)];
                const equip = generateRandomEquipment(quality);
                gameState.player.items.push(equip);
                addToCollection('equipment', equip.name);
                addLog(`获得了装备 ${equip.icon}${equip.name}！`, 'item');
            }
            
            addLog(`🎉 击败${monster.name}！获得${monster.exp}修为，${monster.gold}灵石`, 'combat');
            showNotification(`胜利！+${monster.exp}修为`, 'success');
            
            gameState.battle.inBattle = false;
            
            // 检查是否需要突破
            if (gameState.player.exp >= gameState.player.expNeeded) {
                openBreakthroughModal();
            }
            
            updatePlayerUI();
            saveGame();
            switchView('battle');
        }

        function generateRandomEquipment(quality) {
            const slots = ['weapon', 'armor', 'accessory'];
            const slot = slots[Math.floor(Math.random() * slots.length)];
            const icons = { weapon: '⚔️', armor: '🛡️', accessory: '💍' };
            const names = {
                weapon: { common: '铁剑', good: '精钢剑', excellent: '灵铁剑' },
                armor: { common: '布衣', good: '皮甲', excellent: '铁甲' },
                accessory: { common: '木戒', good: '银戒', excellent: '金戒' }
            };
            
            const statMultipliers = { common: 1, good: 2, excellent: 3, legendary: 5 };
            const mult = statMultipliers[quality] || 1;
            
            const equip = {
                id: `equip_${Date.now()}`,
                name: names[slot][quality],
                icon: icons[slot],
                type: 'equipment',
                slot: slot,
                quality: quality,
                level: 0
            };
            
            if (slot === 'weapon') equip.atk = 3 * mult;
            if (slot === 'armor') equip.def = 2 * mult;
            if (slot === 'accessory') equip.crit = 5 * mult;
            
            return equip;
        }

        function defeat() {
            addLog('你被妖兽击败了...返回主城休息', 'combat');
            showNotification('战斗失败...休息后继续', 'error');
            
            gameState.player.hp = Math.floor(gameState.player.maxHp * 0.3);
            gameState.player.mp = Math.floor(gameState.player.maxMp * 0.3);
            gameState.battle.inBattle = false;
            
            updatePlayerUI();
            saveGame();
            switchView('battle');
        }

        function showDamageNumber(damage, target, isHeal = false) {
            const view = document.getElementById('gameView');
            const num = document.createElement('div');
            num.className = `damage-number ${isHeal ? 'heal' : ''}`;
            num.textContent = isHeal ? `+${damage}` : `-${damage}`;
            num.style.left = target === 'enemy' ? '70%' : '30%';
            num.style.top = '40%';
            view.appendChild(num);
            
            setTimeout(() => num.remove(), 1000);
        }

        // ==================== 灵草园视图 ====================
        
        function renderGardenView(container) {
            container.innerHTML = `
                <div class="view-content" style="display: flex; flex-direction: column; height: 100%; padding: 10px;">
                    <h2 class="view-title">🌿 灵草园</h2>
                    <p style="color: var(--text-secondary); text-align: center; margin-bottom: 10px; font-size: 0.8rem;">
                        灵草成熟后可采摘
                    </p>
                    
                    <div class="herb-garden" id="herbGarden">
                        ${gameState.garden.map((plot, index) => renderPlot(plot, index)).join('')}
                    </div>
                </div>
            `;
        }

        function renderPlot(plot, index) {
            const herb = HERBS[plot.herbId];
            let status, timer;
            
            if (!plot.plantedAt) {
                status = '空闲';
                timer = '点击播种';
            } else if (plot.ready) {
                status = '✅ 可采摘';
                timer = '';
            } else {
                const elapsed = Math.floor((Date.now() - plot.plantedAt) / 1000);
                const remaining = Math.max(0, herb.baseTime - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                status = '🌱 生长中';
                timer = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            return `
                <div class="herb-plot ${plot.ready ? 'ready' : (plot.plantedAt ? 'growing' : '')}" onclick="handlePlotClick(${index})">
                    <div class="herb-icon">${herb.icon}</div>
                    <div class="herb-status">${herb.name}</div>
                    <div class="herb-timer">${timer || status}</div>
                </div>
            `;
        }

        function handlePlotClick(index) {
            const plot = gameState.garden[index];
            
            if (!plot.plantedAt) {
                // 播种
                plot.plantedAt = Date.now();
                plot.ready = false;
                addLog(`在灵草园播种了${HERBS[plot.herbId].name}`, 'cultivation');
                saveGame();
            } else if (plot.ready) {
                // 采摘
                const herb = HERBS[plot.herbId];
                addHerbToInventory(herb);
                addToCollection('herb', herb.name);
                addLog(`采摘了${herb.icon}${herb.name}！`, 'item');
                showNotification(`获得${herb.name}！`, 'success');
                
                // 重置地块
                plot.plantedAt = Date.now();
                plot.ready = false;
                saveGame();
            }
            
            renderGardenView(document.getElementById('gameView'));
        }

        function addHerbToInventory(herb) {
            const existing = gameState.player.items.find(i => i.name === herb.name && i.type === 'herb');
            if (existing) {
                existing.count++;
            } else {
                gameState.player.items.push({
                    ...herb,
                    type: 'herb',
                    id: `herb_${Date.now()}`,
                    count: 1
                });
            }
        }

        // ==================== 炼丹视图 ====================
        
        function renderAlchemyView(container) {
            const player = gameState.player;
            
            container.innerHTML = `
                <div class="view-content alchemy-area">
                    <h2 class="view-title">⚗️ 炼丹</h2>
                    
                    <div class="alchemy-furnace">🏺</div>
                    
                    <p style="color: var(--text-secondary); margin-bottom: 10px; font-size: 0.8rem;">
                        炼制丹药需要相应灵草
                    </p>
                    
                    <div class="alchemy-recipes">
                        ${RECIPES.map(recipe => {
                            const canCraft = recipe.materials.every(mat => {
                                const herb = player.items.find(i => i.name === mat.herb && i.type === 'herb');
                                return herb && herb.count >= mat.count;
                            });
                            
                            return `
                                <div class="recipe-card ${canCraft ? '' : 'disabled'}" onclick="${canCraft ? `craftPill('${recipe.id}')` : ''}">
                                    <div class="recipe-name">${recipe.icon} ${recipe.name}</div>
                                    <div class="recipe-materials">
                                        ${recipe.materials.map(m => {
                                            const have = player.items.find(i => i.name === m.herb && i.type === 'herb');
                                            const count = have ? have.count : 0;
                                            return `${m.herb} x${m.count} (有${count})`;
                                        }).join('<br>')}
                                    </div>
                                    <div class="recipe-effect">${recipe.effect}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function craftPill(recipeId) {
            const recipe = RECIPES.find(r => r.id === recipeId);
            if (!recipe) return;
            
            // 消耗材料
            recipe.materials.forEach(mat => {
                const herbIndex = gameState.player.items.findIndex(i => i.name === mat.herb && i.type === 'herb');
                if (herbIndex >= 0) {
                    gameState.player.items[herbIndex].count -= mat.count;
                    if (gameState.player.items[herbIndex].count <= 0) {
                        gameState.player.items.splice(herbIndex, 1);
                    }
                }
            });
            
            // 添加丹药
            const pill = {
                id: recipe.id,
                name: recipe.name,
                icon: recipe.icon,
                type: 'pill',
                pillType: recipe.type,
                value: recipe.value,
                count: 1,
                quality: 'good'
            };
            
            const existing = gameState.player.items.find(i => i.name === recipe.name && i.type === 'pill');
            if (existing) {
                existing.count++;
            } else {
                gameState.player.items.push(pill);
            }
            
            // 添加到丹方图鉴
            addToCollection('pill', recipe.name);
            
            addLog(`成功炼制了${recipe.icon}${recipe.name}！`, 'item');
            showNotification(`炼制成功！获得${recipe.name}`, 'success');
            
            updatePlayerUI();
            renderAlchemyView(document.getElementById('gameView'));
            saveGame();
        }

        function switchMarketTab(tab) {
            marketTab = tab;
            renderMarketView(document.getElementById('gameView'));
        }

        function renderBuyItems() {
            return MARKET_ITEMS.map(item => `
                <div class="market-item">

                    </button>
                </div>
            `).join('');
        }

        function renderSellItems() {
            const sellableItems = gameState.player.items.filter(i => i.sellPrice);
            
            if (sellableItems.length === 0) {
                return '<p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem;">背包中没有可出售的物品</p>';

            return sellableItems.map((item, idx) => {

                        <button class="market-item-btn" onclick="sellItem(${originalIndex})">
                            出售
                        </button>
                    </div>
                `;
            }).join('');

        function buyItem(itemId) {
            const item = MARKET_ITEMS.find(i => i.id === itemId);
            if (!item || gameState.player.gold < item.price) return;
            
            gameState.player.gold -= item.price;
            
            if (item.type === 'weapon') {
                if (gameState.player.weapon) {
                    gameState.player.gold += Math.floor(item.price * 0.5);
                    addLog('武器已装备，自动出售旧武器', 'system');
                }
                gameState.player.weapon = item;
                gameState.player.attack += item.attack;
            } else if (item.type === 'armor') {
                if (gameState.player.armor) {
                    gameState.player.gold += Math.floor(item.price * 0.5);
                    addLog('护甲已装备，自动出售旧护甲', 'system');
                }
                gameState.player.armor = item;
                gameState.player.defense += item.defense;
            } else if (item.type === 'consumable') {
                const existing = gameState.player.items.find(i => i.name === item.name && i.type === 'consumable');
                if (existing) {
                    existing.count++;
                } else {
                    gameState.player.items.push({
                        id: item.id,
                        name: item.name,
                        icon: item.icon,
                        type: 'consumable',
                        effect: item.effect,
                        count: 1
                    });
                }
            }
            
            addLog(`购买了${item.icon}${item.name}！`, 'item');
            showNotification('购买成功！', 'success');
            
            updatePlayerUI();
            renderMarketView(document.getElementById('gameView'));
            saveGame();
        }

        function sellItem(index) {
            const item = gameState.player.items[index];
            if (!item) return;
            
            gameState.player.gold += item.sellPrice;
            addLog(`出售了${item.icon}${item.name}，获得${item.sellPrice}灵石`, 'item');
            
            item.count--;
            if (item.count <= 0) {
                gameState.player.items.splice(index, 1);
            }
            
            updatePlayerUI();
            renderMarketView(document.getElementById('gameView'));
            saveGame();
        }
