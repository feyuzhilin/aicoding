        function renderInventoryItems() {
            let items = gameState.player.items;
            if (inventoryTab !== 'all') {
                items = items.filter(i => i.type === inventoryTab);
            }
            
            if (items.length === 0) {
                return '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">背包空空如也</p>';
            }
            
            return items.map((item, idx) => {
                const originalIndex = gameState.player.items.indexOf(item);
                return `
                    <div class="item-slot has-item item-quality-${item.quality || 'common'}" onclick="useItem(${originalIndex})">
                        <span class="item-icon">${item.icon}</span>
                        <span class="item-quantity">${item.count}</span>
                    </div>
                `;
            }).join('');
        }

        function useItem(index) {
            const item = gameState.player.items[index];
            if (!item) return;
            
            if (item.type === 'herb') {
                showNotification('灵草需要炼制后才能使用', 'error');
                return;
            }
            
            if (item.type === 'pill') {
                if (item.pillType === 'heal') {
                    gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + item.value);
                    addLog(`使用了${item.icon}${item.name}，恢复了${item.value}点生命`, 'cultivation');
                } else if (item.pillType === 'mana') {
                    gameState.player.mp = Math.min(gameState.player.maxMp, gameState.player.mp + item.value);
                    addLog(`使用了${item.icon}${item.name}，恢复了${item.value}点灵力`, 'cultivation');
                } else if (item.pillType === 'exp') {
                    gameState.player.exp += item.value;
                    addLog(`使用了${item.icon}${item.name}，获得了${item.value}点修为`, 'cultivation');
                }
                
                item.count--;
                if (item.count <= 0) {
                    gameState.player.items.splice(index, 1);
                }
                
                showNotification(`使用了${item.name}`, 'success');
            }
            
            updatePlayerUI();
            renderInventoryView(document.getElementById('gameView'));
            saveGame();
        }

        function learnSkill(skillId) {
            const skill = SKILLS.find(s => s.id === skillId);
            if (!skill || gameState.player.skills.includes(skillId)) return;
            
            gameState.player.skills.push(skillId);
            
            // 应用功法效果
            if (skill.hpBonus) {
                gameState.player.maxHp += skill.hpBonus;
                gameState.player.hp += skill.hpBonus;
            }
            if (skill.defenseBonus && !skill.mpCost) {
                gameState.player.defense += skill.defenseBonus;
            }
            if (skill.attackBonus && skill.mpCost) {
                gameState.player.attack += skill.attackBonus;
            }
            
            addLog(`学会了${skill.icon}${skill.name}！`, 'system');
            showNotification(`学会新功法：${skill.name}`, 'success');
            
            updatePlayerUI();
            renderSkillsView(document.getElementById('gameView'));
            saveGame();
        }

        function equipItem(itemIndex) {
            const item = gameState.player.items[itemIndex];
            if (!item || item.type !== 'equipment') return;
            
            const slot = item.slot;
            const player = gameState.player;
            if (!player.equipped) {
                player.equipped = { weapon: null, armor: null, accessory: null };
            }
            
            // 卸下旧装备
            if (player.equipped[slot]) {
                const oldEquip = player.equipped[slot];
                oldEquip.isEquipped = false;
            }
            
            // 穿上新装备
            item.isEquipped = true;
            player.equipped[slot] = item;
            
            // 从背包移除
            player.items.splice(itemIndex, 1);
            
            // 更新玩家属性
            updatePlayerStats();
            
            addLog(`穿戴了${item.icon}${item.name}`, 'item');
            showNotification(`成功穿戴${item.name}！`, 'success');
            
            updatePlayerUI();
            renderEquipmentView(document.getElementById('gameView'));
            saveGame();
        }

        function updatePlayerStats() {
            const player = gameState.player;
            const equipped = player.equipped || { weapon: null, armor: null, accessory: null };
            
            // 重置装备加成前的属性
            player.attack = 10;
            player.defense = 5;
            player.maxHp = 100;
            player.maxMp = 50;
            player.crit = 0;
            player.expBonus = 0;
            
            // 应用装备加成
            Object.values(equipped).forEach(equip => {
                if (equip) {
                    if (equip.atk) player.attack += equip.atk;
                    if (equip.def) player.defense += equip.def;
                    if (equip.hp) player.maxHp += equip.hp;
                    if (equip.mp) player.maxMp += equip.mp;
                    if (equip.crit) player.crit += equip.crit;
                    if (equip.exp) player.expBonus += equip.exp;
                }
            });
            
            // 确保hp不超过maxHp
            player.hp = Math.min(player.hp, player.maxHp);
            player.mp = Math.min(player.mp, player.maxMp);
        }

        function checkForgeMaterials(forgeType) {
            const forge = FORGING_TYPES[forgeType];
            const player = gameState.player;
            
            for (const mat of forge.materials) {
                if (mat.id === 'same_quality_item') continue; // 这个特殊处理
                const item = player.items.find(i => i.id === mat.id && i.count >= mat.count);
                if (!item) return false;
            }
            return true;
        }

        function startForge(forgeType) {
            const forge = FORGING_TYPES[forgeType];
            const equipped = Object.values(gameState.player.equipped).filter(e => e);
            
            if (equipped.length === 0) {
                showNotification('请先穿戴要炼化的装备！', 'error');
                return;
            }
            
            // 消耗材料
            for (const mat of forge.materials) {
                if (mat.id === 'same_quality_item') continue;
                const item = gameState.player.items.find(i => i.id === mat.id);
                if (item) {
                    item.count -= mat.count;
                    if (item.count <= 0) {
                        gameState.player.items = gameState.player.items.filter(i => i.count > 0);
                    }
                }
            }
            
            // 计算成功率
            const spiritBonus = gameState.player.spirit * 0.5;
            const successRate = Math.min(95, forge.baseSuccess + spiritBonus);
            
            // 判定结果
            const roll = Math.random() * 100;
            
            if (roll < successRate) {
                // 炼器成功
                const targetEquip = equipped[Math.floor(Math.random() * equipped.length)];
                
                if (forgeType === 'enhance') {
                    targetEquip.enhanceLevel = (targetEquip.enhanceLevel || 0) + 1;
                    const bonus = Math.floor((targetEquip.atk || targetEquip.def || 10) * forge.statBoostPerLevel);
                    if (targetEquip.atk) targetEquip.atk += bonus;
                    if (targetEquip.def) targetEquip.def += bonus;
                    
                    addLog(`✨ ${forge.name}成功！${targetEquip.name}提升到+${targetEquip.enhanceLevel}！`, 'system');
                    showNotification(`${forge.name}成功！${targetEquip.name}强化成功！`, 'success');
                } else if (forgeType === 'refine') {
                    // 升阶
                    const qualities = ['common', 'good', 'excellent', 'legendary', 'immortal'];
                    const currentIdx = qualities.indexOf(targetEquip.quality);
                    if (currentIdx < qualities.length - 1) {
                        targetEquip.quality = qualities[currentIdx + 1];
                        addLog(`✨ ${forge.name}成功！${targetEquip.name}品质提升为${targetEquip.quality}！`, 'system');
                        showNotification(`${forge.name}成功！装备品质提升！`, 'success');
                    }
                } else if (forgeType === 'enchant') {
                    if (!targetEquip.special) {
                        targetEquip.special = 'fire_damage';
                        addLog(`✨ ${forge.name}成功！${targetEquip.name}获得火焰之力！`, 'system');
                        showNotification(`${forge.name}成功！装备获得特殊效果！`, 'success');
                    }
                } else if (forgeType === 'soul') {
                    targetEquip.soulLevel = (targetEquip.soulLevel || 0) + 1;
                    addLog(`✨ ${forge.name}成功！${targetEquip.name}注入灵兽精魄！`, 'system');
                    showNotification(`${forge.name}成功！装备获得灵兽之力！`, 'success');
                }
            } else {
                // 炼器失败
                addLog(`💔 ${forge.name}失败！材料被毁...`, 'system');
                showNotification(`${forge.name}失败...材料被毁`, 'error');
            }
            
            updatePlayerStats();
            updatePlayerUI();
            renderForgeView(document.getElementById('gameView'));
            saveGame();
        }

        function getBuildingEffectDesc(building, level) {
            const base = building.effect;
            const perLv = building.effectPerLevel;
            const val = base[Object.keys(base)[0]] + perLv * (level - 1);
            const key = Object.keys(base)[0];
            const labels = {
                mpRegen: `灵力恢复+${val}/秒`,
                alchemyBonus: `炼丹成功率+${val}%`,
                forgeBonus: `炼器成功率+${val}%`,
                herbBonus: `灵草产量+${val}%`,
                petExpBonus: `灵宠经验+${val}%`,
                cultBonus: `修炼效率+${val}%`,
                bagSize: `背包上限+${val}`
            };
            return labels[key] || '';
        }

        function upgradeBuilding(buildingId) {
            const building = MANSION_BUILDINGS.find(b => b.id === buildingId);
            if (!building) return;
            
            const mansion = gameState.mansion;
            const bData = mansion.buildings[buildingId] || { level: 0 };
            const bLevel = bData.level || 0;
            
            if (bLevel >= building.maxLevel) {
                showNotification('建筑已满级！', 'error');
                return;
            }
            
            const cost = Math.floor(building.baseCost.gold * Math.pow(building.costPerLevel, bLevel));
            
            if (gameState.player.gold < cost) {
                showNotification('灵石不足！', 'error');
                return;
            }
            
            gameState.player.gold -= cost;
            mansion.buildings[buildingId] = { level: bLevel + 1 };
            
            const action = bLevel === 0 ? '建造' : '升级';
            addLog(`🏠 ${action}了${building.icon}${building.name}（Lv.${bLevel + 1}）`, 'system');
            showNotification(`${building.name}${action}成功！`, 'success');
            
            updatePlayerUI();
            renderMansionView(document.getElementById('gameView'));
            saveGame();
        }

        function getWeatherEffectDesc(weather) {
            const effects = weather.effects;
            const descs = [];
            if (effects.cultBonus) descs.push(`修炼效率${effects.cultBonus > 0 ? '+' : ''}${effects.cultBonus}%`);
            if (effects.herbBonus) descs.push(`灵草产量+${effects.herbBonus}%`);
            if (effects.thunderBonus) descs.push(`雷系功法+${effects.thunderBonus}%`);
            if (effects.hpRegen) descs.push(`生命恢复${effects.hpRegen > 0 ? '+' : ''}${effects.hpRegen}%`);
            if (effects.mpRegen) descs.push(`灵力恢复+${effects.mpRegen}%`);
            if (effects.encounterBonus) descs.push(`奇遇概率+${effects.encounterBonus}%`);
            return descs.length > 0 ? descs.join('，') : '无特殊效果';
        }

        function changeWeather() {
            const totalWeight = WEATHERS.reduce((sum, w) => sum + w.weight, 0);
            let roll = Math.random() * totalWeight;
            let newWeather = WEATHERS[0];
            
            for (const w of WEATHERS) {
                roll -= w.weight;
                if (roll <= 0) {
                    newWeather = w;
                    break;
                }
            }
            
            if (newWeather.id !== gameState.weather.current.id) {
                gameState.weather.current = newWeather;
                gameState.weather.lastChange = Date.now();
                addLog(`🌤️ 天气变化：${newWeather.icon} ${newWeather.name} - ${newWeather.desc}`, 'system');
            }
        }

        function enterSecretRealm(realmId) {
            const realm = SECRET_REALMS.find(r => r.id === realmId);
            if (!realm) return;

            const sr = gameState.secretRealm;
            sr.exploring = true;
            sr.currentRealm = realmId;
            sr.currentFloor = 1;
            sr.startTime = Date.now();

            addLog(`🌀 进入秘境【${realm.name}】！`, 'system');
            showNotification(`进入${realm.name}！`, 'success');
            renderSecretView(document.getElementById('gameView'));
            saveGame();
        }

        function completeSecretRealm() {
            const sr = gameState.secretRealm;
            const realm = SECRET_REALMS.find(r => r.id === sr.currentRealm);
            const player = gameState.player;

            // BOSS战
            const bossDamage = Math.max(1, realm.bossAtk - player.defense * 0.5);
            const playerDamage = Math.max(1, player.attack - realm.bossDef * 0.5);
            const turnsToKill = Math.ceil(realm.bossHp / playerDamage);
            const totalDamage = Math.floor(bossDamage * turnsToKill * 0.7);

            if (player.hp <= totalDamage) {
                // 战斗失败
                player.hp = Math.floor(player.maxHp * 0.2);
                addLog(`💀 在${realm.name}中被BOSS ${realm.bossName} 击败！`, 'combat');
                showNotification('挑战BOSS失败...', 'error');
            } else {
                // 战斗胜利
                player.hp -= totalDamage;
                
                // 基础奖励
                realm.rewards.forEach(reward => {
                    if (Math.random() * 100 < reward.chance) {
                        switch (reward.type) {
                            case 'exp':
                                player.exp += reward.value;
                                addLog(`  获得 ${reward.value} 修为`, 'item');
                                break;
                            case 'gold':
                                player.gold += reward.value;
                                addLog(`  获得 ${reward.value} 灵石`, 'item');
                                break;
                            case 'herb':
                                addHerbToInventory({ name: reward.name, icon: reward.name === '止血草' ? '🌱' : reward.name === '灵气草' ? '🌿' : reward.name === '培元草' ? '🍀' : reward.name === '九转草' ? '🌾' : '🍄' });
                                addLog(`  获得 ${reward.name} x${reward.count}`, 'item');
                                break;
                            case 'material':
                                const matItem = player.items.find(i => i.id === reward.name);
                                if (matItem) { matItem.count += reward.count; }
                                else { player.items.push({ id: reward.name, name: reward.name, icon: '💎', type: 'material', count: reward.count }); }
                                addLog(`  获得 ${reward.name} x${reward.count}`, 'item');
                                break;
                        }
                    }
                });

                // BOSS奖励
                const bossEquip = {
                    id: 'boss_' + realm.id,
                    name: realm.bossReward.name,
                    icon: realm.bossReward.quality === 'immortal' ? '✨' : realm.bossReward.quality === 'legendary' ? '💜' : '💎',
                    type: 'equipment',
                    slot: 'weapon',
                    quality: realm.bossReward.quality,
                    atk: realm.bossReward.quality === 'immortal' ? 80 : realm.bossReward.quality === 'legendary' ? 50 : realm.bossReward.quality === 'excellent' ? 30 : 15,
                    def: realm.bossReward.quality === 'immortal' ? 20 : 10
                };
                player.items.push(bossEquip);

                // 标记通关
                if (!sr.completed.includes(realm.id)) {
                    sr.completed.push(realm.id);
                }

                addLog(`🎉 击败${realm.bossName}！获得 ${realm.bossReward.name}！`, 'combat');
                showNotification(`通关${realm.name}！获得稀有装备！`, 'success');
            }

            // 设置冷却时间（5分钟）
            sr.cooldowns[realm.id] = Date.now() + 5 * 60 * 1000;
            sr.exploring = false;
            sr.currentRealm = null;

            updatePlayerUI();
            renderSecretView(document.getElementById('gameView'));
            saveGame();
        }

        function getTalentRarityColor(rarity) {
            const colors = { common: '#95a5a6', good: '#2ecc71', excellent: '#3498db', legendary: '#f39c12' };
            return colors[rarity] || '#95a5a6';
        }

        function getTalentRarityLabel(rarity) {
            const labels = { common: '[凡]', good: '[良]', excellent: '[极]', legendary: '[仙]' };
            return labels[rarity] || '[凡]';
        }

        function generateTalentChoices() {
            const talents = gameState.talents;
            talents.available = [];
            
            for (let i = 0; i < 3; i++) {
                const rarity = rollTalentRarity();
                const pool = TALENTS.filter(t => t.rarity === rarity);
                const talent = pool[Math.floor(Math.random() * pool.length)];
                talents.available.push(talent);
            }
        }

        function rollTalentRarity() {
            const roll = Math.random() * 100;
            let cumulative = 0;
            for (const [rarity, weight] of Object.entries(TALENT_RARITY_WEIGHTS)) {
                cumulative += weight;
                if (roll < cumulative) return rarity;
            }
            return 'common';
        }

        function selectTalent(index) {
            const talents = gameState.talents;
            if (index < 0 || index >= talents.available.length) return;
            
            const selected = talents.available[index];
            talents.selected.push(selected.id);
            talents.available = [];
            
            // 应用天赋效果
            applyTalentEffect(selected);
            
            addLog(`✨ 获得天赋【${selected.name}】！`, 'system');
            showNotification(`获得天赋：${selected.name}！`, 'success');
            saveGame();
            renderTalentView(document.getElementById('gameView'));
        }

        function applyTalentEffect(talent) {
            const player = gameState.player;
            const effects = talent.effects;
            
            if (effects.maxMp) player.maxMp += effects.maxMp;
            if (effects.maxHp) player.maxHp += effects.maxHp;
            if (effects.attack) player.attack += effects.attack;
            if (effects.defense) player.defense += effects.defense;
            if (effects.spirit) player.spirit += effects.spirit;
        }

        function rerollTalents() {
            const talents = gameState.talents;
            if (talents.rerollCount <= 0) return;
            
            talents.rerollCount--;
            generateTalentChoices();
            showNotification('天赋已刷新！', 'success');
            renderTalentView(document.getElementById('gameView'));
        }

            const player = gameState.player;
            const reincarnation = gameState.reincarnation;
            
            // 计算继承属性（基于当前属性的10%）
            reincarnation.inheritedStats.baseAttack += Math.floor(player.attack * 0.1);
            reincarnation.inheritedStats.baseDefense += Math.floor(player.defense * 0.1);
            reincarnation.inheritedStats.baseHp += Math.floor(player.maxHp * 0.1);
            reincarnation.inheritedStats.baseMp += Math.floor(player.maxMp * 0.1);
            reincarnation.inheritedStats.baseSpirit += Math.floor(player.spirit * 0.05);
            
            reincarnation.count++;

                            <button onclick="${auto.enabled ? 'stopAutoPlay()' : 'startAutoPlay()'}" style="
                                padding: 15px 50px;
                                background: ${auto.enabled ? 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)' : 'linear-gradient(135deg, #2ecc71 0%, #27ae60 100%)'};
                                border: 2px solid ${auto.enabled ? '#ec7063' : '#58d68d'};
                                border-radius: 25px;
                                color: white;
                                font-family: 'Ma Shan Zheng', cursive;
                                font-size: 1.3rem;
                                cursor: pointer;
                                transition: all 0.3s;
                            ">${auto.enabled ? '⏹️ 停止挂机' : '▶️ 开始挂机'}</button>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; color: var(--text-secondary); font-size: 0.85rem;">
                        <div style="margin-bottom: 8px;">💡 挂机说明：</div>
                        <div>• 开启挂机后，即使关闭页面也会持续获得收益</div>
                        <div>• 离线收益最多累计24小时</div>
                        <div>• 自动战斗需要保持足够的生命值</div>
                    </div>
                </div>
            `;
        }

        function calculateOfflineRewards() {
            const lastSave = gameState.lastSave || Date.now();
            const offlineTime = Math.min(Date.now() - lastSave, 24 * 60 * 60 * 1000); // 最多24小时
            const hours = offlineTime / (60 * 60 * 1000);
            
            const efficiency = getAutoEfficiency();
            const exp = Math.floor(efficiency.expPerHour * hours);
            const gold = Math.floor(efficiency.goldPerHour * hours);
            
            let timeText;
            if (hours < 1) {
                timeText = Math.floor(hours * 60) + '分钟';
            } else {
                timeText = Math.floor(hours) + '小时' + Math.floor((hours % 1) * 60) + '分钟';
            }
            
            return { exp, gold, timeText, hours };
        }

        function getAutoEfficiency() {
            const player = gameState.player;
            const mode = gameState.autoPlay.mode;
            
            let expPerHour = 0;
            let goldPerHour = 0;
            
            switch (mode) {
                case 'cultivation':
                    expPerHour = (player.spirit + 5) * (1 + player.spirit * 0.1) * 3600;
                    break;
                case 'battle':
                    expPerHour = player.attack * 50;
                    goldPerHour = player.attack * 10;
                    break;
                case 'garden':
                    expPerHour = 500;
                    goldPerHour = 200;
                    break;
            }
            
            // 应用天赋加成
            if (gameState.talents.selected.includes('cultivation_prodigy')) {
                expPerHour *= 1.4;
            }
            if (gameState.talents.selected.includes('lucky_star')) {
                goldPerHour *= 1.2;
            }
            
            return { expPerHour: Math.floor(expPerHour), goldPerHour: Math.floor(goldPerHour) };
        }

        function claimOfflineRewards() {
            const rewards = calculateOfflineRewards();
            if (rewards.exp <= 0 && rewards.gold <= 0) return;
            
            gameState.player.exp += rewards.exp;
            gameState.player.gold += rewards.gold;
            gameState.autoPlay.lastReward = Date.now();
            
            addLog(`💤 领取离线收益：${rewards.exp}修为，${rewards.gold}灵石`, 'system');
            showNotification(`领取离线收益成功！`, 'success');
            
            updatePlayerUI();
            saveGame();
            renderAutoPlayView(document.getElementById('gameView'));
        }

        function setAutoMode(mode) {
            gameState.autoPlay.mode = mode;
            renderAutoPlayView(document.getElementById('gameView'));
        }

        function startAutoPlay() {
            gameState.autoPlay.enabled = true;
            gameState.autoPlay.startTime = Date.now();
            addLog('🤖 自动挂机已开启！', 'system');
            showNotification('自动挂机已开启！', 'success');
            renderAutoPlayView(document.getElementById('gameView'));
        }

        function stopAutoPlay() {
            gameState.autoPlay.enabled = false;
            gameState.autoPlay.startTime = null;
            addLog('⏹️ 自动挂机已停止', 'system');
            showNotification('自动挂机已停止', 'success');
            renderAutoPlayView(document.getElementById('gameView'));
        }

        // ==================== 图鉴收集系统视图 (v2.5) ====================

        function renderCollectionView(container) {
            const collection = gameState.collection;
            const player = gameState.player;
            
            // 转换Set为数组用于显示
            const monsterCount = collection.monster?.size || 0;
            const herbCount = collection.herb?.size || 0;
            const pillCount = collection.pill?.size || 0;
            const equipmentCount = collection.equipment?.size || 0;
            
            container.innerHTML = `
                <div class="view-content" style="padding: 20px;">
                    <h2 class="view-title">📚 图鉴收集</h2>
                    
                    <!-- 总览 -->
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px;">
                        <div style="background: linear-gradient(135deg, rgba(231, 76, 60, 0.2) 0%, rgba(192, 57, 43, 0.2) 100%); border: 2px solid #e74c3c; border-radius: 12px; padding: 20px; text-align: center;">
                            <div style="font-size: 2.5rem; margin-bottom: 8px;">🐉</div>
                            <div style="color: var(--accent-gold); font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem;">妖兽图鉴</div>
                            <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">${monsterCount} 种</div>
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(46, 204, 113, 0.2) 0%, rgba(39, 174, 96, 0.2) 100%); border: 2px solid #2ecc71; border-radius: 12px; padding: 20px; text-align: center;">
                            <div style="font-size: 2.5rem; margin-bottom: 8px;">🌿</div>
                            <div style="color: var(--accent-gold); font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem;">灵草图鉴</div>
                            <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">${herbCount} 种</div>
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(155, 89, 182, 0.2) 0%, rgba(142, 68, 173, 0.2) 100%); border: 2px solid #9b59b6; border-radius: 12px; padding: 20px; text-align: center;">
                            <div style="font-size: 2.5rem; margin-bottom: 8px;">💊</div>
                            <div style="color: var(--accent-gold); font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem;">丹方图鉴</div>
                            <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">${pillCount} 种</div>
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(241, 196, 15, 0.2) 0%, rgba(211, 172, 13, 0.2) 100%); border: 2px solid #f1c40f; border-radius: 12px; padding: 20px; text-align: center;">
                            <div style="font-size: 2.5rem; margin-bottom: 8px;">⚔️</div>
                            <div style="color: var(--accent-gold); font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem;">装备图鉴</div>
                            <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">${equipmentCount} 种</div>
                        </div>
                    </div>
                    
                    <!-- 收集奖励 -->
                    <div style="background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px;">
                        <div style="font-family: 'Ma Shan Zheng', cursive; font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 20px;">
                            🎁 收集奖励
                        </div>
                        
                        ${Object.entries(COLLECTION_REWARDS).map(([type, rewards]) => {
                            const typeName = COLLECTION_TYPES[type].name;
                            const typeIcon = COLLECTION_TYPES[type].icon;
                            const currentCount = collection[type]?.size || 0;
                            
                            return `
                                <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                                        <span style="font-size: 1.5rem;">${typeIcon}</span>
                                        <span style="color: var(--accent-gold); font-family: 'Ma Shan Zheng', cursive; font-size: 1.2rem;">${typeName}</span>
                                        <span style="color: var(--text-secondary); font-size: 0.9rem;">(${currentCount} / ${rewards[rewards.length-1].count})</span>
                                    </div>
                                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                                        ${rewards.map(r => {
                                            const claimed = collection.rewardsClaimed?.[type]?.includes(r.count);
                                            const canClaim = currentCount >= r.count && !claimed;
                                            
                                            return `
                                                <div style="
                                                    background: ${claimed ? 'rgba(46, 204, 113, 0.2)' : canClaim ? 'rgba(241, 196, 15, 0.2)' : 'rgba(0,0,0,0.3)'};
                                                    border: 2px solid ${claimed ? '#2ecc71' : canClaim ? '#f1c40f' : 'var(--text-secondary)'};
                                                    border-radius: 8px;
                                                    padding: 10px 15px;
                                                    display: flex;
                                                    align-items: center;
                                                    gap: 10px;
                                                ">
                                                    <span style="color: var(--text-secondary); font-size: 0.85rem;">${r.count}种</span>
                                                    <span style="color: ${claimed ? '#2ecc71' : canClaim ? '#f1c40f' : 'var(--text-secondary)'}; font-size: 0.85rem;">${r.reward.desc}</span>
                                                    ${canClaim ? `<button onclick="claimCollectionReward('${type}', ${r.count})" style="padding: 4px 10px; background: #f1c40f; border: none; border-radius: 4px; color: #000; font-size: 0.75rem; cursor: pointer;">领取</button>` : ''}
                                                    ${claimed ? '<span style="color: #2ecc71; font-size: 0.8rem;">✓</span>' : ''}
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    
                    <!-- 收集提示 -->
                    <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; color: var(--text-secondary); font-size: 0.85rem;">
                        <div style="margin-bottom: 8px;">💡 收集提示：</div>
                        <div>• 击败妖兽可解锁妖兽图鉴</div>
                        <div>• 采集灵草可解锁灵草图鉴</div>
                        <div>• 炼制丹药可解锁丹方图鉴</div>
                        <div>• 获得装备可解锁装备图鉴</div>
                        <div>• 达成收集目标可领取丰厚奖励</div>
                    </div>
                </div>
            `;
        }

        function claimCollectionReward(type, count) {
            const collection = gameState.collection;
            const rewards = COLLECTION_REWARDS[type];
            const reward = rewards.find(r => r.count === count);
            
            if (!reward || collection.rewardsClaimed[type].includes(count)) return;
            
            // 发放奖励
            if (reward.reward.gold) gameState.player.gold += reward.reward.gold;
            if (reward.reward.spirit) gameState.player.spirit += reward.reward.spirit;
            if (reward.reward.attack) gameState.player.attack += reward.reward.attack;
            
            collection.rewardsClaimed[type].push(count);
            
            addLog(`🎁 领取图鉴奖励：${COLLECTION_TYPES[type].name} ${count}种达成！`, 'system');
            showNotification('奖励领取成功！', 'success');
            
            updatePlayerUI();
            saveGame();
            renderCollectionView(document.getElementById('gameView'));
        }

        // ==================== 图鉴收集辅助函数 ====================

        function addToCollection(type, item) {
            const collection = gameState.collection;
            if (!collection[type]) collection[type] = new Set();
            
            const key = typeof item === 'string' ? item : item.name || item.id;
            if (!collection[type].has(key)) {
                collection[type].add(key);
                addLog(`📚 图鉴更新：解锁【${key}】`, 'system');
            }
        }

        // ==================== 游戏循环 ====================
        
        function gameLoop() {
            const player = gameState.player;
            
            // 灵力自然恢复（应用天赋加成）
            let mpRegen = 1;
            if (gameState.talents.selected.includes('spirit_affinity')) mpRegen *= 1.3;
            if (player.mp < player.maxMp) {
                player.mp = Math.min(player.maxMp, player.mp + mpRegen);
            }
            
            // 天气系统：每120秒切换一次天气
            if (Date.now() - gameState.weather.lastChange > 120000) {
                changeWeather();
            }
            
            // 检查灵草园
            gameState.garden.forEach(plot => {
                if (plot.plantedAt && !plot.ready) {
                    const herb = HERBS[plot.herbId];
                    const elapsed = Math.floor((Date.now() - plot.plantedAt) / 1000);
                    if (elapsed >= herb.baseTime) {
                        plot.ready = true;
                    }
                }
            });
            
            // 自动挂机收益计算
            if (gameState.autoPlay.enabled) {
                // 挂机收益在离线时计算，这里只更新显示
            }
            
            // 自动存档
            if (Date.now() - gameState.lastSave > 30000) {
                saveGame();
            }
            
            updatePlayerUI();
        }

        // ==================== 初始化 ====================
        
        function initGame() {
            loadGame();
            
            // 初始化新系统（兼容旧存档）
            if (!gameState.talents) {
                gameState.talents = { selected: [], available: [], rerollCount: 3 };
            }
            if (!gameState.reincarnation) {
                gameState.reincarnation = { count: 0, ascended: false, inheritedStats: { baseAttack: 0, baseDefense: 0, baseHp: 0, baseMp: 0, baseSpirit: 0 } };
            }
            if (!gameState.autoPlay) {
                gameState.autoPlay = { enabled: false, mode: 'cultivation', startTime: null, lastReward: null };
            }
            if (!gameState.collection) {
                gameState.collection = { monster: new Set(), herb: new Set(), pill: new Set(), equipment: new Set(), rewardsClaimed: { monster: [], herb: [], pill: [], equipment: [] } };
            }
            
            // 如果是新游戏，设置默认值
            if (!gameState.player.realm) {
                gameState.player = {
                    name: '无名修士',
                    realm: '炼气期',
                    level: 1,
                    exp: 0,
                    expNeeded: 100,
                    hp: 100,
                    maxHp: 100,
                    mp: 50,
                    maxMp: 50,
                    attack: 10,
                    defense: 5,
                    spirit: 5,
                    agility: 5,
                    gold: 100,
                    skills: ['basic_attack', 'spirit_boost'],
                    items: [],
                    cultivationTime: 0,
                    totalExp: 0
                };
            }
            
            // 应用转生继承属性
            const inherited = gameState.reincarnation.inheritedStats;
            if (inherited.baseAttack > 0) gameState.player.attack += inherited.baseAttack;
            if (inherited.baseDefense > 0) gameState.player.defense += inherited.baseDefense;
            if (inherited.baseHp > 0) {
                gameState.player.maxHp += inherited.baseHp;
                gameState.player.hp = gameState.player.maxHp;
            }
            if (inherited.baseMp > 0) {
                gameState.player.maxMp += inherited.baseMp;
                gameState.player.mp = gameState.player.maxMp;
            }
            if (inherited.baseSpirit > 0) gameState.player.spirit += inherited.baseSpirit;
            
            // 应用已选择的天赋效果
            gameState.talents.selected.forEach(tid => {
                const talent = TALENTS.find(t => t.id === tid);
                if (talent) applyTalentEffect(talent);
            });
            
            updatePlayerUI();
            switchView('cultivation');
            
            // 启动游戏循环
            setInterval(gameLoop, 1000);
            
            // 每5秒刷新灵草园
            setInterval(() => {
                if (gameState.currentView === 'garden') {
                    renderGardenView(document.getElementById('gameView'));
                }
            }, 5000);
            
            addLog('修仙世界已加载，祝你早日飞升！', 'system');
            addLog(`当前版本: v${gameState.version || '2.2'}`, 'system');
        }

        // 页面加载完成后初始化
        window.onload = initGame;

        // 页面关闭前保存
        window.onbeforeunload = () => {
            saveGame();
        };
    </script>
</body>
</html>
