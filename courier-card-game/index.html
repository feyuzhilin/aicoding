<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>废墟邮差</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">离线单人卡牌 Roguelite</p>
          <h1>废墟邮差</h1>
        </div>
        <div class="top-actions">
          <button id="newRunBtn" type="button">新路线</button>
          <button id="saveBtn" type="button">导出</button>
          <button id="importBtn" type="button">导入</button>
        </div>
      </header>

      <section class="dashboard" aria-label="状态面板">
        <div class="stat"><span>天数</span><strong id="dayStat">1 / 8</strong></div>
        <div class="stat"><span>耐久</span><strong id="hpStat">36 / 36</strong></div>
        <div class="stat"><span>包裹</span><strong id="packageStat">100%</strong></div>
        <div class="stat"><span>疲劳</span><strong id="fatigueStat">0</strong></div>
        <div class="stat"><span>声响</span><strong id="noiseStat">0 / 10</strong></div>
        <div class="stat"><span>补给</span><strong id="supplyStat">2</strong></div>
      </section>

      <section class="layout">
        <aside class="panel route-panel">
          <div class="panel-title">
            <h2>路线</h2>
            <span id="seedLabel"></span>
          </div>
          <div id="routeMap" class="route-map"></div>
          <div class="relics">
            <h3>工具遗物</h3>
            <div id="relicList" class="chip-list"></div>
          </div>
        </aside>

        <section class="stage" aria-live="polite">
          <div id="message" class="message"></div>
          <div id="combatView" class="combat-view hidden">
            <div class="enemy-row" id="enemyRow"></div>
            <div class="combat-center">
              <div class="player-card">
                <span>邮差</span>
                <strong id="playerHp">36</strong>
                <small id="playerBlock">护甲 0</small>
              </div>
              <div class="intent-card">
                <span>敌方意图</span>
                <strong id="intentText">攻击</strong>
                <small id="combatGoal">目标</small>
              </div>
            </div>
            <div id="hand" class="hand"></div>
            <div class="combat-actions">
              <button id="endTurnBtn" type="button">结束回合</button>
              <button id="fleeBtn" type="button">尝试脱离</button>
            </div>
          </div>

          <div id="choiceView" class="choice-view"></div>
        </section>

        <aside class="panel log-panel">
          <div class="panel-title">
            <h2>牌组</h2>
            <span id="deckCount"></span>
          </div>
          <div class="deck-preview" id="deckPreview"></div>
          <div class="panel-title">
            <h2>日志</h2>
          </div>
          <ol id="logList" class="log-list"></ol>
        </aside>
      </section>
    </main>

    <dialog id="saveDialog">
      <form method="dialog" class="dialog-body">
        <h2>存档导入导出</h2>
        <p>存档会自动保存在本浏览器，也可以复制文本或下载 JSON，在另一台设备手动导入。</p>
        <textarea id="saveText" spellcheck="false"></textarea>
        <div class="dialog-actions">
          <button id="copySaveBtn" type="button">复制</button>
          <button id="downloadSaveBtn" type="button">下载 JSON</button>
          <label class="file-button">
            选择文件
            <input id="fileInput" type="file" accept="application/json,.json" />
          </label>
          <button id="loadTextBtn" type="button">从文本导入</button>
          <button type="submit">关闭</button>
        </div>
      </form>
    </dialog>

    <script src="./game.js"></script>
  </body>
</html>
